{% extends 'base.html' %}

{% block title %}Registracija{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="text-center mb-1" >Registracija</h2>
            <form method="post">
                {% csrf_token %}
                {% load crispy_forms_tags %}
                {{ form | crispy }}
                <button class="btn btn-success w-100" type="submit">Registruotis</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
