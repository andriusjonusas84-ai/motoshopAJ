{% extends 'base.html' %}

{% block title %}Registracija{% endblock %}

{% block content %}
<div class="container mt-3 w-25 justify-content-center">
    <h2 class="text-center mb-3" >Registracija</h2>
    <form method="post">
        {% csrf_token %}
        {% load crispy_forms_tags %}
        {{ form | crispy }}
        <button class="btn btn-success w-100" type="submit">Registruotis</button>
    </form>
</div>
{% endblock %}
