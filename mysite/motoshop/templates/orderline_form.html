{% extends 'base.html' %}

{% block title %}Užsakymo eilutės redagavimas užsakyme{% endblock %}

{% block content %}
<div class="container w-25">
<h5 class="mt-3">Užsakymo eilutės redagavimas užsakyme</h5>
<p>Prekė: <span class="fw-bold">{{ object.product.title }}</span></p>
<form method="post">
    {% csrf_token %}
    {% load crispy_forms_tags %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-success w-10">Išsaugoti</button>
</form>
</div>
{% endblock %}
